<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121212">
  <title>DarkBeat Music</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="app.css">
  <link rel="preconnect" href="https://api.jamendo.com">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash">
    <div class="splash-logo">
      <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#1db954"/><circle cx="50" cy="50" r="25" fill="#121212"/><path d="M50 35a15 15 0 0 1 15 15" stroke="#1db954" stroke-width="4" fill="none" stroke-linecap="round"/></svg>
    </div>
    <div class="splash-title">DarkBeat</div>
  </div>

  <!-- App Container -->
  <div id="app" class="app hidden">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="icon-btn" id="menuBtn" aria-label="Menu">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor"/></svg>
        </button>
        <span class="page-title" id="pageTitle">Home</span>
      </div>
      <div class="top-bar-right">
        <button class="icon-btn" id="searchBtn" aria-label="Search">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 0 0 1.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 0 0-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 0 0 5.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
        </button>
        <button class="icon-btn" id="settingsBtn" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84a.484.484 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.04.64.09.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.29.41.48.41h3.84c.24 0 .48-.17.5-.41l.36-2.54c.59-.24 1.13-.58 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>

    <!-- Search Overlay -->
    <div id="searchOverlay" class="search-overlay hidden">
      <div class="search-bar">
        <button class="icon-btn" id="closeSearch" aria-label="Back">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/></svg>
        </button>
        <input type="text" id="searchInput" placeholder="What do you want to listen to?" autocomplete="off">
        <button class="icon-btn" id="clearSearch" aria-label="Clear">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/></svg>
        </button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
      <!-- Home -->
      <div id="homePage" class="page active">
        <div class="greeting" id="greeting">Good evening</div>
        <div class="quick-picks" id="quickPicks"></div>
        <div id="recommendations" class="rec-section"></div>
        <div class="section-header">
          <h2>Trending Now</h2>
          <span class="show-all">Show all</span>
        </div>
        <div class="horizontal-scroll" id="trendingNow"></div>
        <div class="section-header">
          <h2>Recently Played</h2>
          <span class="show-all">Show all</span>
        </div>
        <div class="horizontal-scroll" id="recentlyPlayed"></div>
      </div>

      <!-- Library -->
      <div id="libraryPage" class="page">
        <div class="library-tabs">
          <button class="tab-btn active" data-tab="playlists">Playlists</button>
          <button class="tab-btn" data-tab="artists">Artists</button>
          <button class="tab-btn" data-tab="albums">Albums</button>
        </div>
        <div class="library-actions">
          <button class="btn-primary" id="newPlaylistBtn">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/></svg>
            New Playlist
          </button>
          <button class="btn-secondary" id="importSpotifyBtn">Import from Spotify</button>
        </div>
        <div id="playlistList" class="playlist-list"></div>
        <div id="artistList" class="artist-list hidden"></div>
        <div id="albumList" class="album-list hidden"></div>
      </div>

      <!-- Playlist Detail -->
      <div id="playlistDetailPage" class="page">
        <button class="back-btn" id="backFromPlaylist">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/></svg>
        </button>
        <div class="playlist-header" id="playlistHeader"></div>
        <div class="playlist-actions-row">
          <button class="play-btn-large" id="playlistPlayBtn">
            <svg viewBox="0 0 24 24" width="28" height="28"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
          </button>
          <button class="icon-btn" id="shufflePlaylistBtn" aria-label="Shuffle">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z" fill="currentColor"/></svg>
          </button>
          <button class="icon-btn" id="morePlaylistBtn" aria-label="More options">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="track-list" id="trackList"></div>
      </div>

      <!-- Wrapped Page -->
      <div id="wrappedPage" class="page">
        <div class="wrapped-header">
          <h1>Your Wrapped</h1>
        </div>
        <div id="wrappedContent"></div>
      </div>
    </div>

    <!-- Now Playing Bar (Mini) -->
    <div class="now-playing-bar" id="nowPlayingBar">
      <div class="np-info" id="npInfo">
        <div class="np-cover" id="npCover"></div>
        <div class="np-text">
          <div class="np-title" id="npTitle">Not Playing</div>
          <div class="np-artist" id="npArtist">-</div>
        </div>
        <button class="icon-btn np-like" id="npLike" aria-label="Like">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="np-controls">
        <button class="icon-btn" id="npPrev" aria-label="Previous">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="currentColor"/></svg>
        </button>
        <button class="play-btn" id="npPlay" aria-label="Play/Pause">
          <svg viewBox="0 0 24 24" width="28" height="28" id="playIcon"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
          <svg viewBox="0 0 24 24" width="28" height="28" id="pauseIcon" class="hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/></svg>
        </button>
        <button class="icon-btn" id="npNext" aria-label="Next">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="np-progress-area">
        <div class="np-time" id="currentTime">0:00</div>
        <div class="progress-container" id="progressContainer">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="np-time" id="totalTime">0:00</div>
      </div>
    </div>

    <!-- Full Screen Player -->
    <div id="fullPlayer" class="full-player hidden">
      <div class="fp-bg" id="fpBg"></div>
      <div class="fp-content">
        <div class="fp-top">
          <button class="icon-btn" id="closeFullPlayer">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" fill="currentColor"/></svg>
          </button>
          <span class="fp-playing-from">Playing from your library</span>
          <button class="icon-btn" id="fpMore">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="fp-cover-area">
          <div class="fp-cover" id="fpCover"></div>
        </div>
        <div class="fp-info">
          <div class="fp-title" id="fpTitle">Title</div>
          <div class="fp-artist" id="fpArtist">Artist</div>
        </div>
        <div class="fp-progress">
          <div class="progress-container" id="fpProgressContainer">
            <div class="progress-bar" id="fpProgressBar"></div>
          </div>
          <div class="fp-time-row">
            <span id="fpCurrentTime">0:00</span>
            <span id="fpTotalTime">0:00</span>
          </div>
        </div>
        <div class="fp-controls">
          <button class="icon-btn" id="fpShuffle" aria-label="Shuffle">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z" fill="currentColor"/></svg>
          </button>
          <button class="icon-btn" id="fpPrev" aria-label="Previous">
            <svg viewBox="0 0 24 24" width="28" height="28"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="currentColor"/></svg>
          </button>
          <button class="play-btn-large" id="fpPlay" aria-label="Play/Pause">
            <svg viewBox="0 0 24 24" width="32" height="32" id="fpPlayIcon"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
            <svg viewBox="0 0 24 24" width="32" height="32" id="fpPauseIcon" class="hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/></svg>
          </button>
          <button class="icon-btn" id="fpNext" aria-label="Next">
            <svg viewBox="0 0 24 24" width="28" height="28"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" fill="currentColor"/></svg>
          </button>
          <button class="icon-btn" id="fpRepeat" aria-label="Repeat">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="fp-extra">
          <button class="icon-btn" id="fpLike" aria-label="Like">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z" fill="currentColor"/></svg>
          </button>
          <button class="icon-btn" id="fpAdd" aria-label="Add to playlist">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/></svg>
          </button>
          <button class="icon-btn" id="fpShare" aria-label="Share">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav" id="bottomNav">
      <button class="nav-btn active" data-page="homePage">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-page="libraryPage">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z" fill="currentColor"/></svg>
        <span>Library</span>
      </button>
      <button class="nav-btn" data-page="wrappedPage">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" fill="currentColor"/></svg>
        <span>Wrapped</span>
      </button>
    </div>

    <!-- Audio Element -->
    <audio id="audioPlayer" preload="metadata"></audio>

    <!-- Import Spotify Modal -->
    <div id="importModal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" id="closeImportModal">&times;</button>
        <h3>Import from Spotify</h3>
        <p>Enter your Spotify Playlist URL or ID to import:</p>
        <input type="text" id="spotifyPlaylistUrl" placeholder="https://open.spotify.com/playlist/...">
        <button class="btn-primary" id="importSpotifyConfirm">Import Playlist</button>
        <div id="importStatus"></div>
      </div>
    </div>

    <!-- New Playlist Modal -->
    <div id="newPlaylistModal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" id="closeNewPlaylistModal">&times;</button>
        <h3>New Playlist</h3>
        <input type="text" id="newPlaylistName" placeholder="Playlist Name">
        <button class="btn-primary" id="createPlaylistConfirm">Create</button>
      </div>
    </div>

    <!-- Add to Playlist Modal -->
    <div id="addToPlaylistModal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" id="closeAddToPlaylistModal">&times;</button>
        <h3>Add to Playlist</h3>
        <div id="addToPlaylistList"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
